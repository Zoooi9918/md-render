# Release — Tag-triggered GitHub release
# Triggers on tag push (v*) — more reliable than version-check
# Creates GitHub release and attaches dist/ artifacts

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }} — md-render"
          generate_release_notes: true
          files: |
            dist/md-render.esm.js
            dist/md-render.esm.min.js
            dist/md-render.umd.js
            dist/md-render.umd.min.js
            dist/md-render.iife.js
            dist/md-render.iife.min.js
            dist/md-render.css
            dist/md-render.min.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}