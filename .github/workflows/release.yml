# Release — Version-triggered tag + GitHub release
# Triggers when package.json version changes on main
# Creates a git tag, GitHub release, and attaches dist/ artifacts

name: Release

on:
  push:
    branches: [main]
    paths:
      - "package.json"

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.version_check.outputs.changed }}
      version: ${{ steps.version_check.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Check if version in package.json changed compared to previous commit
      - name: Check version change
        id: version_check
        uses: EndBug/version-check@v2.1.1
        with:
          diff-search: true

      - name: Read current version
        if: steps.version_check.outputs.changed == 'true'
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  release:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: "Release v${{ needs.check-version.outputs.version }}"
          generate_release_notes: true
          files: |
            dist/md-render.esm.js
            dist/md-render.esm.min.js
            dist/md-render.umd.js
            dist/md-render.umd.min.js
            dist/md-render.iife.js
            dist/md-render.iife.min.js
            dist/md-render.css
            dist/md-render.min.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
