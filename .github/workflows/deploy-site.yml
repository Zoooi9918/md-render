# Deploy demo site to GitHub Pages
# Triggers on push to main when site/ or dist/ changes

name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "dist/**"
      - ".github/workflows/deploy-site.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Prepare deploy directory
        run: |
          mkdir deploy
          cp -r site/* deploy/
          cp -r dist/* deploy/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_branch: gh-pages
          publish_dir: ./deploy
          force_orphan: true
        env:
          GitHub_Action_Token: ${{ secrets.GITHUB_TOKEN }}
